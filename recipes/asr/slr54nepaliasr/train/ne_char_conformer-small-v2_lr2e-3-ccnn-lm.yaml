##############################################################################
# Model: Conformer-ASR small version 2
# Tokens: Character
# Augmentation: Speech Perturbation + SpecAugment

# losses: 0.2 Label Smooth + CTC loss

# Training: train of SLR54NepaliASR
# Validation: valid of SLR54NepaliASR
# Testing: test of SLR54NepaliASR

# Authors: Rupak Raj (rughimire)
# ############################################################################


###################################
# Experiment Parameters and setup #
###################################

# dataset-related
dataset_path: datasets/
dataset: slr54nepaliasr
train_set: train
test_set: test
valid_set: valid

# waveform-related
wav_format: wav16000
sample_rate: 16000

# tokenizer-related
txt_format: no-punc
vocab_subset: train
token_type: char
token_num:

# batch-related
batch_len: 5.8e7
valid_batch_len: 2.4e7

# model-related
ctc_weight: 0.3
label_smoothing: 0.2
d_model: 144
num_heads: 4
fdfwd_dim: 1024
dropout: 0.4
encoder_num_layers: 8
decoder_num_layers: 4

# optimizer-related
warmup_steps: 16000

# running-related
seed: 0
num_workers: 8
pin_memory: True
non_blocking: True

# gradient-related
accum_grad: 1
ft_factor: 1.0
grad_clip: 5.0

# multi-GPU-related
ngpu: 3 # please change ngpu based on the situation of your machine
gpus: [0,1,2] # null means the GPUs with the largest free memory will be used

# training-related
train: True
best_model_selection: !tuple (valid, accuracy, max, 10)
early_stopping_patience: 10
num_epochs: 100

# snapshot-related
visual_snapshot_number: 3
visual_snapshot_interval: 5

# testing-related
test: False
test_model: 10_valid_accuracy_average

# This argument is shared by data_cfg and train_cfg
data_root: !ref <dataset_path>/<dataset>/data



#################################
# Model Inference Configuration #
#################################
infer_cfg:
  shared_args:
    beam_size: 16
  exclu_args:
    # ASR-only decoding
    - ctc_weight: 0.2
    # ASR-LM decoding
    # - ctc_weight: 0.3
    #  lm_weight: 0.6



##############################
# Data Loading Configuration #
##############################
data_cfg:
  train:
    type: block.BlockIterator
    conf:
      dataset_type: speech_text.SpeechTextDataset
      dataset_conf:
        main_data:
          feat: !ref <data_root>/<wav_format>/<train_set>/idx2wav
          text: !ref <data_root>/<wav_format>/<train_set>/idx2<txt_format>_text
        use_speed_perturb: True

      data_len: !ref <data_root>/<wav_format>/<train_set>/idx2wav_len
      shuffle: True
      is_descending: True
      batch_len: !ref <batch_len>

  valid:
    type: block.BlockIterator
    conf:
      dataset_type: speech_text.SpeechTextDataset
      dataset_conf:
        main_data:
          feat: !ref <data_root>/<wav_format>/<valid_set>/idx2wav
          text: !ref <data_root>/<wav_format>/<valid_set>/idx2<txt_format>_text

      shuffle: False
      data_len: !ref <data_root>/<wav_format>/<valid_set>/idx2wav_len
      batch_len: !ref <valid_batch_len>


  # the cascading structure is needed inorder to fix the iterator while runnign the test
  test:
    test:
      type: block.BlockIterator
      conf:
        dataset_type: speech_text.SpeechTextDataset
        dataset_conf:
          main_data:
            feat: !ref <data_root>/<wav_format>/<test_set>/idx2wav
            text: !ref <data_root>/<wav_format>/<test_set>/idx2<txt_format>_text

        data_len: !ref <data_root>/<wav_format>/<test_set>/idx2wav_len
        shuffle: False
        batch_len: !ref <valid_batch_len>


####################################
# Model Construction Configuration #
####################################
train_cfg:
  model:
    model_type: ar_asr.ARASR
    model_conf:
      customize_conf:
        ctc_weight: !ref <ctc_weight>
        token_type: !ref <token_type>
        token_path: !ref <data_root>/<token_type>/<vocab_subset>/<token_num>/<txt_format>
        #lm_model_cfg: recipes/lm/librispeech/lm_text/exp/100-bpe5k_transformer/train_cfg.yaml
        #lm_model_path: recipes/lm/librispeech/lm_text/exp/100-bpe5k_transformer/models/5_valid_text_ppl_average.pth

    module_conf:
      frontend:
        type: frontend.speech2mel.Speech2MelSpec
        conf:
          sr: !ref <sample_rate>
          preemphasis: 0.97
          hop_length: 0.010
          win_length: 0.025
          n_mels: 80

      normalize: True

      specaug:
        freq_mask_width: 15
        freq_mask_num: 4
        time_mask_width: 0.05
        time_mask_num: 5

      enc_prenet:
        type: prenet.conv2d.Conv2dPrenet
        conf:
          conv_dims:
            - !ref <d_model>
            - !ref <d_model>
          conv_kernel: 3
          conv_stride: 2
          conv_batchnorm: true
          conv_activation: LeakyReLU
          lnr_dims: !ref <d_model>

      encoder:
        type: conformer.encoder.ConformerEncoder
        conf:
          posenc_dropout: !ref <dropout>
          emb_scale: False
          d_model: !ref <d_model>
          num_heads: !ref <num_heads>
          num_layers: !ref <encoder_num_layers>
          att_dropout: !ref <dropout>
          fdfwd_dim: !ref <fdfwd_dim>
          fdfwd_activation: GELU
          fdfwd_dropout: !ref <dropout>
          res_dropout: !ref <dropout>
          layernorm_first: true

      dec_emb:
        type: prenet.embed.EmbedPrenet
        conf:
          embedding_dim: !ref <d_model>

      decoder:
        type: transformer.decoder.TransformerDecoder
        conf:
          posenc_dropout: !ref <dropout>
          posenc_scale: false
          emb_layernorm: true
          emb_scale: false
          d_model: !ref <d_model>
          num_heads: !ref <num_heads>
          num_layers: !ref <decoder_num_layers>
          att_dropout: !ref <dropout>
          fdfwd_dim: !ref <fdfwd_dim>
          fdfwd_activation: GELU
          fdfwd_dropout: !ref <dropout>
          res_dropout: !ref <dropout>
          layernorm_first: true

    criterion_conf:
      ce_loss:
        label_smoothing: !ref <label_smoothing>
        temperature: 1.0
        length_normalized: false

        # CCNN args (new)
        ccnn_import: speechain.model.ccnn:CCNN
        ccnn_ckpt: /home/is/r-ghimire/decoding/checkpoint/ccnn_lstm_slr54_ep50_new_tokenizer.pt
        ccnn_pad_id: 0          # must match your tokenizer PAD id
        ccnn_bos_id: 65
        # ccnn_temp: 1.0
        # detach_ccnn: true

        # only needed if your checkpoint does NOT store these and you want to override
        ccnn_d_model: 256
        ccnn_n_layers: 2
        ccnn_dropout: 0.1

  optim_sches:
    type: noam.Noamlr
    conf:
      optim_type: AdamW
      optim_conf:
        weight_decay: 1e-3
        lr: 0.002
        betas:
          - 0.9
          - 0.98
        eps: 1.0e-9
      warmup_steps: !ref <warmup_steps>
